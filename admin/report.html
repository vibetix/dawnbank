<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - DawnBank Admin</title>
  <link rel="icon" href="../assets/Images/dawnbank.ico" type="image/x-icon" />
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
   <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Include Feather Icons as a replacement for Lucide -->
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/user_profile.js"></script>
</head>
<body>
  <div>
     <div class="sidebar" id="sidebar" style="background-color:#1D3B78">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">DB</div>
          <h1 class="logo-text">DawnBank</h1>
        </div>
          <img id="close" src="assets/images/icons/close.png">
             </div>
      <nav class="sidebar-nav">
        <a href="admin-index.html" class="nav-link">
         <img src="assets/images/icons/home.png">
          <span>Dashboard</span>
        </a>
        <a href="accounts.html" class="nav-link">
         <img src="assets/images/icons/account.png">
          <span>Accounts</span>
        </a>
        <a href="transactions.html" class="nav-link">
          <img src="assets/images/icons/transaction.png">
          <span>Transactions</span>
        </a>
        <a href="support.html" class="nav-link">
          <img src="assets/images/icons/support.png">
          <span>Support</span>
        </a>
        <a href="message.html" class="nav-link">
          <img src="assets/images/icons/chat.png">
          <span>Messages</span>
        </a>
        <a href="user.html" class="nav-link">
          <img src="assets/images/icons/users.png">
          <span>Users</span>
        </a>
        <a href="report.html" class="nav-link active">
          <img src="assets/images/icons/report.png">
          <span>Reports</span>
        </a>
        <a href="settings.html" class="nav-link">
          <img src="assets/images/icons/settings.png">
          <span>Settings</span>
        </a>
      </nav>
       <div class="sidebar-footer">
        <div class="user-profile">
          <div class="avatar">
            <img src="https://github.com/shadcn.png" alt="User avatar">
            <div class="avatar-fallback" style="display:none;"></div>
          </div>
              <div class="user-info" style="display:block;">
              <div class="user-name">Loading...</div>
              <div class="user-role">Admin</div>
          </div>
          <button class="profile-dropdown-trigger">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9">
              <div class="dropdown-menu" id="dropdown-menu">
                        <a href="">Profile</a>
                        <a href="">Logout</a>
              </div>
            </polyline></svg>
          </button>
        </div>
      </div>
    </div>
    <main class="main-content">
      <header class="main-header">
        <div class="logo">
          <div class="logo-icon" id="logo">DB</div>
        </div>
        <div class="search-container">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" class="search-input" placeholder="Search...">
        </div>
        <div class="header-actions">
          <button class="notification-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span class="notification-badge"></span>
          </button>
          <div class="user-dropdown">
            <div class="avatar-small">
                <img src="https://github.com/shadcn.png" alt="User avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="avatar-fallback-small" style="display:none;"></div>
            </div>
            <span class="user-name-small">Loading...</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            <div class="drop" id="drop-menu">
                <a href="">Profile</a>
                <a href="">Logout</a>
            </div>
        </div>
        </div>
      </header>
      <div id="menu-bar">
        <button id="menu-image" style="background-color:transparent;border: none;">
        <img  src="assets/images/icons/menu.png">
        </button>
      </div>
      <div class="dashboard-container">
        <div class="transactions-section" style="padding: 20px;">
            <div class="section-header">
              <h1>Reports</h1>
     <!-- Time Period Selection -->
        <div class="filter-section" style="display: flex;flex-direction: row; gap: 10px;flex-wrap: wrap;">
            <label for="report-type">Select Report Type:</label>
            <select id="report-type">
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
            <button class="export-button" id="generate">Generate Report</button>
        </div>
      </div>
        <!-- Report Table -->
        <div class="table-container">
            <table id="report-table">
                <thead>
                    <tr>
                        <th><button class="sort-button" id="id"> Transaction ID</button></th>
                        <th><button class="sort-button" id="user"> User</button></th>
                        <th><button class="sort-button" id="amount"> Amount</button></th>
                        <th><button class="sort-button" id="type"> Type</button></th>
                        <th><button class="sort-button" id="date"> Date</button></th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be inserted dynamically -->
                </tbody>
            </table>
        </div>
        <div class="table-footer">
              <span class="showing-text">Showing 10 of 8,249 users</span>
              <div class="pagination">
                <button class="pagination-button active">1</button>
                <button class="pagination-button">2</button>
                <button class="pagination-button">3</button>
                <span class="pagination-ellipsis">...</span>
                <button class="pagination-button">825</button>
              </div>
            </div>
        <!-- Export Buttons -->
        <div class="export-section" style="gap:10px; margin-bottom: 10px; margin-top: 10px;">
            <button class="export-button" id="export-pdf">Download PDF</button>
            <button class="export-button" id="export-csv">Download CSV</button>
        </div>
  </div>
  <!-- Chart Section -->
        <div class="chart-container" style="padding:10px">
            <canvas id="reportChart"></canvas>
        </div>

    <script src="assets/js/report_ajax.js"></script>

        </div>
        </main>
      </div>
</body>
<script src="assets/js/admin.js"></script>
<script>
  feather.replace();
</script>
</html>
