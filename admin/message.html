<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DawnBank - Admin Dashboard</title>
  <link rel="icon" href="../assets/Images/dawnbank.ico" type="image/x-icon" />
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/chat.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
   <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Include Feather Icons as a replacement for Lucide -->
    <script src="https://unpkg.com/feather-icons"></script>
     <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/user_profile.js"></script>
    <style>
      body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    height: 200vh; /* Just to create scrollable space */
}
/* Add this to your CSS */
@keyframes softPulse {
    0% { background-color: transparent; }
    50% { background-color: rgba(255, 223, 186, 0.5); } /* light orange glow */
    100% { background-color: transparent; }
}

.message.pulse {
    animation: softPulse 0.8s ease-in-out;
}

.scroll-down {
  display: none;
    position: fixed;
    bottom: 100px;
    right: 20px;
    transform: translateX(-50%);
    font-size: 20px;
    cursor: pointer;
    color: white;
    background-color: dodgerblue;
    padding: 2px 5px;
    border-radius: 50%;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(3px); }
}
/* Hide arrow when scrolling down */
.hidden {
    opacity: 0;
    pointer-events: none;
}
#target-section {
    margin-top: 100vh;
    padding: 50px;
    background-color: lightgray;
}

    </style>
</head>
<body>
  <div>
    <div class="sidebar" id="sidebar" style="background-color:#1D3B78">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">DB</div>
          <h1 class="logo-text">DawnBank</h1>
        </div>
          <img id="close" src="assets/images/icons/close.png">
             </div>
      <nav class="sidebar-nav">
        <a href="admin-index.html" class="nav-link">
         <img src="assets/images/icons/home.png">
          <span>Dashboard</span>
        </a>
        <a href="accounts.html" class="nav-link">
         <img src="assets/images/icons/account.png">
          <span>Accounts</span>
        </a>
        <a href="transactions.html" class="nav-link">
          <img src="assets/images/icons/transaction.png">
          <span>Transactions</span>
        </a>
        <a href="support.html" class="nav-link">
          <img src="assets/images/icons/support.png">
          <span>Support</span>
        </a>
        <a href="message.html" class="nav-link active">
          <img src="assets/images/icons/chat.png">
          <span>Messages</span>
        </a>
        <a href="user.html" class="nav-link">
          <img src="assets/images/icons/users.png">
          <span>Users</span>
        </a>
        <a href="report.html" class="nav-link">
          <img src="assets/images/icons/report.png">
          <span>Reports</span>
        </a>
        <a href="settings.html" class="nav-link">
          <img src="assets/images/icons/settings.png">
          <span>Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="avatar">
            <img src="https://github.com/shadcn.png" alt="User avatar">
            <div class="avatar-fallback" style="display:none;"></div>
          </div>
              <div class="user-info" style="display:block;">
              <div class="user-name">Loading...</div>
              <div class="user-role">Admin</div>
          </div>
          <button class="profile-dropdown-trigger">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9">
              <div class="dropdown-menu" id="dropdown-menu">
                        <a href="">Profile</a>
                        <a href="">Logout</a>
              </div>
            </polyline></svg>
          </button>
        </div>
      </div>
    </div>
    <main class="main-content">
      <!-- Header -->
      <header class="main-header">
        <div class="logo">
          <div class="logo-icon" id="logo">DB</div>
        </div>
        <div class="search-container">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" class="search-input" placeholder="Search...">
        </div>
        <div class="header-actions">
          <button class="notification-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span class="notification-badge"></span>
          </button>
          <div class="user-dropdown">
            <div class="avatar-small">
                <img src="https://github.com/shadcn.png" alt="User avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="avatar-fallback-small" style="display:none;"></div>
            </div>
            <span class="user-name-small">Loading...</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            <div class="drop" id="drop-menu">
                <a href="">Profile</a>
                <a href="">Logout</a>
            </div>
        </div>
        </div>
      </header>
      <div id="menu-bar">
        <button id="menu-image" style="background-color:transparent;border: none;">
        <img  src="assets/images/icons/menu.png">
        </button>
      </div>
      <!-- Dashboard Content -->
      <div class="dashboard-container">
        <div class="chat-app">
            <div class="chat-app-sidebar" id="chat-app-sidebar">
                <div class="sidebar-header">Recent Messages</div>
                <div class="chat-list">
                </div>
            </div>
            <div class="backdrop" id="backdrop" onclick="closeSidebar()"></div>
            <div class="main">
                <div class="chat-header">
                    <div class="header-left">
                        <button class="menu-button" onclick="toggleSidebar()">
                          <img src="assets/images/icons/menu-box.png">
                        </button>
                        <div class="active-chat-name" id="active-chat-name"></div>
                    </div>
                </div>
                <div class="messages-container" id="messages-container" style="text-align: left;">
                
                </div>

                <div class="input-area" style="display:none;">
                    <textarea class="message-input" id="message-input" placeholder="Type a message..." rows="1"></textarea>
                    <button class="send-button" id="send-button" onclick="sendMessage()" >
                        <img src="assets/images/icons/send.png">
                    </button>
                </div>
            </div>
            <div id="scrollArrow" class="scroll-down" onclick="scrollToBottom()">
                &#x25BC; <!-- Down Arrow -->
            </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    const chat = document.querySelector(".chat-app-sidebar")
        function toggleSidebar() {
         if (window.innerWidth > 1024) {
        console.log("Screen width is above 1024px. Function will not execute.");
        return;
            }else{
            chat.classList.toggle('open');
            }
        }

        function closeSidebar() {
            chat.classList.remove('open');
        }
function scrollToBottom() {
    let messageContainer = document.getElementById("messages-container");
    if (messageContainer) {
        messageContainer.scrollTop = messageContainer.scrollHeight; // Scroll to bottom
    } else {
        console.error("Message container not found!");
    }
}

// Hide arrow when the user scrolls to the bottom of the message container
const scrollArrow = document.getElementById("scrollArrow");
const messageContainer = document.getElementById("messages-container");

messageContainer.addEventListener("scroll", function () {
    if (messageContainer.scrollTop + messageContainer.clientHeight >= messageContainer.scrollHeight) {
        scrollArrow.classList.add("hidden"); // Hide when at the bottom
    } else {
        scrollArrow.classList.remove("hidden"); // Show when not at the bottom
    }
});

  </script>
</body>
<script src="assets/js/chats.js"></script>
<script src="assets/js/livechat.js"></script>
</html>
