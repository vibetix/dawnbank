<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - DawnBank Admin </title>
    <link rel="icon" href="../assets/Images/dawnbank.ico" type="image/x-icon" />
    <link rel="stylesheet" href="assets/css/login.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
      <style>
      #load{
  height: 5px;
  background-color: dodgerblue;
  width: 100%;
  border-radius: 50px;
  animation: 2s move infinite; 
  display: none;
}
@keyframes move{
  0%{
    width: 0;
  }
  100%{
    width: 100%;
  }
}
#message-container {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 400px;
    text-align: center;
    z-index: 1000;
}
    </style>
  </head>
  <body>
    <div class="flex min-h-screen flex-col items-center justify-center bg-background p-4">
      <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="mb-8 flex justify-center">
          <div class="flex items-center gap-2">
            <div class="flex h-12 w-12 items-center justify-center rounded-full bg-bank-blue text-white text-xl font-bold">
              DB
            </div>
            <div class="text-2xl font-bold">DawnBank</div>
          </div>
        </div>
        <div id="message-container" style="top:6%;"></div>

        <div class="card border-none shadow-card">
          <div id="load"></div>
          <div class="card-header space-y-1">
            <h3 class="card-title text-2xl font-bold text-center">Sign in</h3>
            <p class="card-description text-center text-muted-foreground">
              Enter your credentials to access your account
            </p>
          </div>
          <div class="card-content">
            <form id="signInForm" class="space-y-4">
              <div class="space-y-2">
                <label for="email" class="block">Email</label>
                <div class="relative">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground">
                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                  </svg>
                  <input
                    id="email"
                    type="email"
                    placeholder="name@example.com"
                    class="input pl-10"
                  />
                </div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center justify-between">
                  <label for="password" class="block">Password</label>
                  
                </div>
                <div class="relative">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted-foreground">
                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                  </svg>
                  <input
                    id="password"
                    type="password"
                    placeholder="••••••••"
                    class="input pl-10"
                  />
                  <button
                    type="button"
                    id="togglePassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground"
                  >
                    <svg id="eyeOff" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
                      <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                      <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                      <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                      <line x1="2" x2="22" y1="2" y2="22"></line>
                    </svg>
                    <svg id="eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 hidden">
                      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </div>
              </div>
              <a href="#" class="text-sm font-medium text-bank-blue hover:underline">
                    Forgot password?
                  </a>
              <button 
                type="submit" 
                id="signInButton"
                class="button w-full flex items-center gap-2"
              >
                <span id="buttonText">Sign in</span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
                  <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                  <polyline points="10 17 15 12 10 7"></polyline>
                  <line x1="15" x2="3" y1="12" y2="12"></line>
                </svg>
              </button>
            </form>
          </div>
          <div class="card-footer flex flex-col space-y-4">
            <div class="text-center text-sm text-muted-foreground">
              Don't have an account?
              <a
                href="signup.html"
                class="font-medium text-bank-blue hover:underline"
              >
                Sign up
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden">
      <div class="toast-content">
        <p id="toastMessage"></p>
      </div>
    </div>
    <script src="assets/js/login_ajax.js"></script>
    <script src="assets/js/signin.js"></script>
  </body>
</html>
