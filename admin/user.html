<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - DawnBank Admin</title>
  <link rel="icon" href="../assets/Images/dawnbank.ico" type="image/x-icon" />
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
   <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Include Feather Icons as a replacement for Lucide -->
    <script src="https://unpkg.com/feather-icons"></script>
       <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
       <link rel="stylesheet" href="assets/css/login.css">
    <script src="assets/js/user_profile.js"></script>
    <style>
      #transferModal{z-index: 999999}
         #load{
  height: 5px;
  background-color: dodgerblue;
  width: 100%;
  border-radius: 50px;
  animation: 2s move infinite; 
  display: none;
}
@keyframes move{
  0%{
    width: 0;
  }
  100%{
    width: 100%;
  }
}
                 .form-group {
    margin-bottom: 15px;
    padding: 0 20px;
}
.button-sec {
background: #0066cc;
color: white;
border: none;
padding: 10px;
width: 90%;
cursor: pointer;
border-radius: 5px;
margin-bottom: 20px;
}
.form-group label {
display: block;
font-weight: 500;
margin-bottom: 5px;
}
.form-group input, .form-group select, .form-group textarea {
width: 100%;
padding: 10px;
border: 1px solid #ddd;
border-radius: 5px;
}
.modal-content{
  position: relative;
}
#togglePassword{
  position: absolute;
  right:40PX;
}
.close-modal:hover{
  cursor: pointer;
}
a{
  text-decoration: none;
}
a:hover{
  text-decoration: none;
}
    </style>
</head>
<body>
  <div>
    <div class="sidebar" id="sidebar" style="background-color:#1D3B78">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">DB</div>
          <h1 class="logo-text">DawnBank</h1>
        </div>
          <img id="close" src="assets/images/icons/close.png">
             </div>
      <nav class="sidebar-nav">
        <a href="admin-index.html" class="nav-link">
         <img src="assets/images/icons/home.png">
          <span>Dashboard</span>
        </a>
        <a href="accounts.html" class="nav-link">
         <img src="assets/images/icons/account.png">
          <span>Accounts</span>
        </a>
        <a href="transactions.html" class="nav-link">
          <img src="assets/images/icons/transaction.png">
          <span>Transactions</span>
        </a>
        <a href="support.html" class="nav-link">
          <img src="assets/images/icons/support.png">
          <span>Support</span>
        </a>
        <a href="message.html" class="nav-link">
          <img src="assets/images/icons/chat.png">
          <span>Messages</span>
        </a>
        <a href="user.html" class="nav-link active">
          <img src="assets/images/icons/users.png">
          <span>Users</span>
        </a>
        <a href="report.html" class="nav-link">
          <img src="assets/images/icons/report.png">
          <span>Reports</span>
        </a>
        <a href="settings.html" class="nav-link">
          <img src="assets/images/icons/settings.png">
          <span>Settings</span>
        </a>
      </nav>
       <div class="sidebar-footer">
        <div class="user-profile">
          <div class="avatar">
            <img src="https://github.com/shadcn.png" alt="User avatar">
            <div class="avatar-fallback" style="display:none;"></div>
          </div>
              <div class="user-info" style="display:block;">
              <div class="user-name">Loading...</div>
              <div class="user-role">Admin</div>
          </div>
          <button class="profile-dropdown-trigger">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9">
              <div class="dropdown-menu" id="dropdown-menu">
                        <a href="">Profile</a>
                        <a href="">Logout</a>
              </div>
            </polyline></svg>
          </button>
        </div>
      </div>
    </div>
    <main class="main-content">
      <!-- Header -->
      <header class="main-header">
        <div class="logo">
          <div class="logo-icon" id="logo">DB</div>
        </div>
        <div class="search-container">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" class="search-input" placeholder="Search...">
        </div>
        <div class="header-actions">
          <button class="notification-button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span class="notification-badge"></span>
          </button>
          <div class="user-dropdown">
            <div class="avatar-small">
                <img src="https://github.com/shadcn.png" alt="User avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="avatar-fallback-small" style="display:none;"></div>
            </div>
            <span class="user-name-small">Loading...</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            <div class="drop" id="drop-menu">
                <a href="">Profile</a>
                <a href="">Logout</a>
            </div>
        </div>
        </div>
      </header>
      <div id="menu-bar">
        <button id="menu-image" style="background-color:transparent;border: none;">
        <img  src="assets/images/icons/menu.png">
        </button>
      </div>
      <!-- Dashboard Content -->
      <div class="dashboard-container">
        <div class="welcome-card">
          <div>
            <h1 class="welcome-title">User Management</h1>
            <p class="welcome-subtitle">View and manage user accounts in the DawnBank system.</p>
          </div>
        </div>

        <!-- Users Table Section -->
          <div class="users-section">
            <div class="section-header">
              <h3>Bank Users</h3>
              <div class="search-container" style=" width: 30%;">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="search-input" placeholder="Search clients...">
                <button class="export-button">Search</button>
              </div>
              <button class="export-button" onclick="openTransferModal()" style="display:flex; flex-direction: row;gap: 5px;line-height: 25px;">
                <i data-feather="user-plus"></i>
                Add New User
              </button>
            </div>
            <div class="table-container">
              <table class="users-table">
                <thead>
                  <tr>
                    <th>
                      <button class="sort-button" data-sort="no">
                        #
                      </button>
                    </th>
                    <th>
                      <button class="sort-button" data-sort="id">
                        User ID
                        <i data-feather="arrow-up-down" class="sort-icon"></i>
                      </button>
                    </th>
                    <th>
                      <button class="sort-button" data-sort="name">
                        User Name
                        <i data-feather="arrow-up-down" class="sort-icon"></i>
                      </button>
                    </th>
                    <th>
                      <button class="sort-button" data-sort="email">
                        Email
                        <i data-feather="arrow-up-down" class="sort-icon"></i>
                      </button>
                    </th>
                    <th>
                      <button class="sort-button" data-sort="idType">
                        ID Type
                        <i data-feather="arrow-up-down" class="sort-icon"></i>
                      </button>
                    </th>
                    <th>
                      <button class="sort-button" data-sort="idNumber">
                        ID Number
                        <i data-feather="arrow-up-down" class="sort-icon"></i>
                      </button>
                    </th>
                    <th>
                      <button class="sort-button" data-sort="address">
                        Address
                        <i data-feather="arrow-up-down" class="sort-icon"></i>
                      </button>
                    </th>
                    <th>
                      <button class="sort-button" data-sort="action">
                        Action
                        <i data-feather="arrow-up-down" class="sort-icon"></i>
                      </button>
                    </th>
                  </tr>
                </thead>
                <tbody id="usersTableBody">
                  <!-- User rows will be populated via JavaScript -->
                </tbody>
              </table>
            </div>
            <div class="table-footer">
              <span class="showing-text">Showing 10 of 8,249 users</span>
              <div class="pagination">
                <button class="pagination-button active">1</button>
                <button class="pagination-button">2</button>
                <button class="pagination-button">3</button>
                <span class="pagination-ellipsis">...</span>
                <button class="pagination-button">825</button>
              </div>
            </div>
          </div>
      </div>
    </main>
    <div id="transferModal" class="modal">
          <div class="modal-content">
            <div id="load"></div>
            <span class="close-modal" style="float: right" onclick="closeTransferModal()">&times;</span>
              <h3 class="form-title" style="text-align: center;">Create your account</h3>
                <form class="signup-form fade-in-up">
                    <div class="form-section" id="step-1">
                        <div class="form-group">
                            <label for="firstName"><i class="fas fa-user"></i> First Name</label>
                            <input type="text" id="firstName" placeholder="Enter your first name" required>
                        </div>

                        <div class="form-group">
                            <label for="lastName"><i class="fas fa-user"></i> Last Name</label>
                            <input type="text" id="lastName" placeholder="Enter your last name" required>
                        </div>

                        <div class="form-group">
                            <label for="email"><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>

                          <!-- Password Field -->
                          <div class="form-group">
                              <label for="password"><i class="fas fa-lock"></i> Password</label>
                              <div class="password-container">
                                  <input type="password" id="password" placeholder="Create a password" required>
                                  <button
                    type="button"
                    id="togglePassword"
                    class="translate-y-1/2 text-muted-foreground"
                   >
                    <svg id="eyeOff" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
                      <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                      <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                      <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                      <line x1="2" x2="22" y1="2" y2="22"></line>
                    </svg>
                    <svg id="eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 hidden">
                      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                              </div>
                          </div>
                          <div id="buttons">
                          <button type="submit" class="button-sec" id="submitBtn">
                              <i class="fas fa-user-plus"></i> Create Account
                          </button>
                        </div>
                      </div>
                </form>
              </div>
            </div>
          </div>
      </div>
  </div>
</body>
<script src="assets/js/admin.js"></script>
<script src="assets/js/users.js"></script>
<script src="assets/js/add_new_user.js"></script>
<script>feather.replace();</script>
</html>
