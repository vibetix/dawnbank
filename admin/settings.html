<script>
  $(document).ready(function() {
      // Fetch system info
      function fetchSystemInfo() {
          $.ajax({
              url: "../includes/fetch_system.php",
              type: "GET",
              dataType: "json",
              success: function(response) {
                  if (response.error) {
                      $("#site-info").html("<p>" + response.error + "</p>");
                  } else {
                      $("#site-info").html(`
                          <div class="site-info">
                              <img src="${response.image}" alt="Site Image" class="site-image">
                              <p><strong>Name:</strong> ${response.name}</p>
                              <p><strong>Email:</strong> ${response.email}</p>
                              <p><strong>Contact:</strong> ${response.contact}</p>
                              <p><strong>Address:</strong> ${response.address}</p>
                              <p><strong>Created:</strong> ${response.creaeted}</p>
                          </div>
                      `);
  
                      // Populate form fields
                      $("#system_id").val(response.system_id);
                      $("#name").val(response.name);
                      $("#email").val(response.email);
                      $("#contact").val(response.contact);
                      $("#address").val(response.address);
                      $("#current_image").val(response.image);
                  }
              }
          });
      }
  
      fetchSystemInfo(); // Load data on page load
  
      // Submit update form
      $("#updateForm").submit(function(e) {
          e.preventDefault();
          var formData = new FormData(this);
  
          $.ajax({
              url: "update_system.php",
              type: "POST",
              data: formData,
              contentType: false,
              processData: false,
              dataType: "json",
              success: function(response) {
                  if (response.success) {
                      alert("Update Successful!");
                      fetchSystemInfo(); // Refresh data
                  } else {
                      alert("Update Failed!");
                  }
              }
          });
      });
  });
  </script>
